<style>
/* ── DESIGN SYSTEM ─────────────────────────────────────────── */
:root {
  --bg:        #0c0d0f;
  --bg-raised: #111318;
  --bg-card:   #161a21;
  --bg-hover:  #1d2230;
  --border:    #222840;
  --border-hi: #2e3860;
  --text:      #e4e8f0;
  --text-dim:  #6b7490;
  --text-mid:  #9ba4be;
  --accent:    #5e8bff;
  --accent2:   #7c6fff;
  --green:     #3dd68c;
  --red:       #ff5e7e;
  --gold:      #f0c060;
  --teal:      #4ecdc4;
  --font-mono: 'DM Mono', monospace;
  --font-body: 'DM Sans', sans-serif;
  --font-serif:'Libre Baskerville', Georgia, serif;
  --r:         6px;
  --r2:        10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 13px; line-height: 1.5; }
body { display: flex; flex-direction: column; }

/* ── SCROLLBAR ─────────────────────────────────────────────── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 4px; }

/* ── LAYOUT ────────────────────────────────────────────────── */
.app { display: flex; height: 100vh; overflow: hidden; }

.sidebar {
  width: 220px; min-width: 220px;
  background: var(--bg-raised);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.sidebar-logo {
  padding: 20px 18px 16px;
  border-bottom: 1px solid var(--border);
}
.sidebar-logo h1 {
  font-family: var(--font-serif);
  font-size: 15px; font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text);
}
.sidebar-logo .version {
  font-family: var(--font-mono);
  font-size: 10px; color: var(--accent);
  margin-top: 2px;
}

.nav { flex: 1; overflow-y: auto; padding: 10px 8px; }
.nav-section-label {
  font-size: 9px; font-weight: 600; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--text-dim);
  padding: 10px 10px 4px;
}
.nav-item {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 10px; border-radius: var(--r);
  cursor: pointer; transition: all 0.15s;
  color: var(--text-mid); font-size: 13px; font-weight: 400;
  user-select: none;
}
.nav-item:hover { background: var(--bg-hover); color: var(--text); }
.nav-item.active { background: rgba(94,139,255,0.12); color: var(--accent); }
.nav-item svg { flex-shrink: 0; opacity: 0.8; }

.sidebar-footer {
  padding: 12px 14px; border-top: 1px solid var(--border);
}
.sidebar-footer .usd-rate {
  font-family: var(--font-mono); font-size: 11px; color: var(--text-dim);
}
.sidebar-footer .usd-rate span { color: var(--gold); }

.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.topbar {
  height: 50px; min-height: 50px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  background: var(--bg-raised);
  border-bottom: 1px solid var(--border);
}
.topbar h2 { font-family: var(--font-serif); font-size: 15px; font-weight: 700; }
.topbar-meta { display: flex; align-items: center; gap: 16px; }
.topbar-ts { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); }
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 12px; border-radius: var(--r);
  font-size: 12px; font-weight: 500; cursor: pointer;
  border: 1px solid var(--border-hi);
  background: var(--bg-card); color: var(--text-mid);
  transition: all 0.15s;
}
.btn:hover { background: var(--bg-hover); color: var(--text); }
.btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn.primary:hover { opacity: 0.85; }

.content { flex: 1; overflow-y: auto; padding: 24px; }

/* ── LOADING / ERROR ────────────────────────────────────────── */
.loading-screen {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; height: 100%;
  gap: 16px; color: var(--text-dim);
}
.spinner {
  width: 28px; height: 28px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── GRID / CARDS ────────────────────────────────────────────── */
.grid { display: grid; gap: 16px; }
.grid-2 { grid-template-columns: repeat(2, 1fr); }
.grid-3 { grid-template-columns: repeat(3, 1fr); }
.grid-4 { grid-template-columns: repeat(4, 1fr); }
.grid-auto { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }

.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 18px 20px;
}
.card-sm { padding: 14px 16px; }
.card-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.card-title {
  font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--text-dim);
}
.card-action { font-size: 11px; color: var(--accent); cursor: pointer; }
.card-action:hover { text-decoration: underline; }

/* ── STAT CARDS ──────────────────────────────────────────────── */
.stat-value {
  font-family: var(--font-mono);
  font-size: 22px; font-weight: 500; letter-spacing: -0.02em;
  color: var(--text); margin-bottom: 2px;
}
.stat-label { font-size: 11px; color: var(--text-dim); }
.stat-delta {
  font-family: var(--font-mono); font-size: 11px; margin-top: 6px;
}
.stat-delta.pos { color: var(--green); }
.stat-delta.neg { color: var(--red); }
.stat-delta.neu { color: var(--text-dim); }

/* ── TABLES ──────────────────────────────────────────────────── */
.table-wrap { overflow-x: auto; margin: 0 -4px; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th {
  text-align: left; padding: 6px 10px;
  font-size: 9px; font-weight: 600; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--text-dim);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
td {
  padding: 7px 10px; border-bottom: 1px solid rgba(34,40,64,0.5);
  color: var(--text-mid); white-space: nowrap;
}
tr:hover td { background: var(--bg-hover); color: var(--text); }
.mono { font-family: var(--font-mono); }
.right { text-align: right; }
.center { text-align: center; }

/* ── VALUE COLORS ────────────────────────────────────────────── */
.pos { color: var(--green); }
.neg { color: var(--red); }
.accent { color: var(--accent); }
.gold { color: var(--gold); }
.teal { color: var(--teal); }
.dim { color: var(--text-dim); }

/* ── BADGES ──────────────────────────────────────────────────── */
.badge {
  display: inline-block; padding: 2px 7px;
  border-radius: 4px; font-size: 10px; font-weight: 500;
}
.badge-blue  { background: rgba(94,139,255,0.15);  color: var(--accent); }
.badge-green { background: rgba(61,214,140,0.12);  color: var(--green); }
.badge-red   { background: rgba(255,94,126,0.12);  color: var(--red); }
.badge-gold  { background: rgba(240,192,96,0.12);  color: var(--gold); }
.badge-dim   { background: rgba(107,116,144,0.12); color: var(--text-dim); }

/* ── PROGRESS BARS ───────────────────────────────────────────── */
.progress-bar {
  height: 4px; background: var(--border);
  border-radius: 2px; overflow: hidden; margin-top: 8px;
}
.progress-fill {
  height: 100%; border-radius: 2px;
  background: var(--accent); transition: width 0.4s ease;
}

/* ── ALLOCATION DONUT ────────────────────────────────────────── */
.donut-wrap { display: flex; align-items: center; gap: 24px; }
.donut-legend { display: flex; flex-direction: column; gap: 10px; }
.donut-legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; }
.donut-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ── ACCOUNT ROWS ────────────────────────────────────────────── */
.acct-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 0; border-bottom: 1px solid var(--border);
}
.acct-row:last-child { border-bottom: none; }
.acct-name { font-weight: 500; color: var(--text); }
.acct-meta { font-family: var(--font-mono); font-size: 11px; }

/* ── FILTER BAR ──────────────────────────────────────────────── */
.filter-bar {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 18px; flex-wrap: wrap;
}
.filter-input {
  background: var(--bg-card); border: 1px solid var(--border);
  color: var(--text); border-radius: var(--r);
  padding: 6px 12px; font-size: 12px; font-family: var(--font-body);
  outline: none; min-width: 180px;
}
.filter-input:focus { border-color: var(--accent); }
.filter-select {
  background: var(--bg-card); border: 1px solid var(--border);
  color: var(--text-mid); border-radius: var(--r);
  padding: 6px 10px; font-size: 12px; font-family: var(--font-body);
  outline: none; cursor: pointer;
}
.filter-pill {
  padding: 4px 10px; border-radius: 20px; font-size: 11px;
  cursor: pointer; border: 1px solid var(--border);
  color: var(--text-dim); transition: all 0.12s;
}
.filter-pill:hover { border-color: var(--accent); color: var(--accent); }
.filter-pill.active { background: rgba(94,139,255,0.15); border-color: var(--accent); color: var(--accent); }

/* ── SECTION ────────────────────────────────────────────────── */
.section { margin-bottom: 28px; }
.section-title {
  font-family: var(--font-serif); font-size: 15px;
  font-weight: 700; margin-bottom: 14px;
  display: flex; align-items: center; gap: 10px;
}
.section-title::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}
.sub-title {
  font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--text-dim); margin-bottom: 10px;
}

/* ── TAB NAV ─────────────────────────────────────────────────── */
.tabs { display: flex; gap: 2px; margin-bottom: 20px; }
.tab {
  padding: 7px 16px; border-radius: var(--r);
  font-size: 12px; font-weight: 500; cursor: pointer;
  color: var(--text-dim); transition: all 0.12s;
  border: 1px solid transparent;
}
.tab:hover { color: var(--text); }
.tab.active {
  background: var(--bg-card); border-color: var(--border);
  color: var(--text); font-weight: 600;
}

/* ── TOOLTIP ─────────────────────────────────────────────────── */
.recharts-tooltip-wrapper .custom-tooltip {
  background: var(--bg-raised); border: 1px solid var(--border);
  border-radius: var(--r); padding: 10px 14px;
  font-family: var(--font-mono); font-size: 11px;
}

/* ── LOGIN SCREEN ────────────────────────────────────────────── */
.login-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
}
.login-box {
  width: 340px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 36px 32px;
}
.login-box h1 {
  font-family: var(--font-serif);
  font-size: 20px; font-weight: 700;
  margin-bottom: 4px;
}
.login-box .login-sub {
  font-size: 12px; color: var(--text-dim);
  margin-bottom: 28px;
}
.login-error {
  font-size: 12px; color: var(--red);
  font-family: var(--font-mono);
  margin-bottom: 12px; min-height: 16px;
}

/* ── CONFIG SCREEN ───────────────────────────────────────────── */
.config-screen {
  max-width: 560px; margin: 40px auto;
}
.config-screen h2 { font-family: var(--font-serif); font-size: 20px; margin-bottom: 8px; }
.config-screen p { color: var(--text-mid); margin-bottom: 24px; }
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 6px; font-weight: 600; letter-spacing: 0.05em; }
.form-input {
  width: 100%; background: var(--bg-card); border: 1px solid var(--border);
  color: var(--text); border-radius: var(--r); padding: 9px 14px;
  font-size: 13px; font-family: var(--font-mono); outline: none;
}
.form-input:focus { border-color: var(--accent); }
.form-hint { font-size: 11px; color: var(--text-dim); margin-top: 5px; }

/* ── ANIMATIONS ──────────────────────────────────────────────── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.fade-up { animation: fadeUp 0.3s ease forwards; }
.fade-up-d1 { animation-delay: 0.05s; opacity: 0; }
.fade-up-d2 { animation-delay: 0.1s;  opacity: 0; }
.fade-up-d3 { animation-delay: 0.15s; opacity: 0; }

@media (max-width: 900px) {
  .grid-4 { grid-template-columns: repeat(2, 1fr); }
  .grid-3 { grid-template-columns: repeat(2, 1fr); }
  .sidebar { width: 52px; min-width: 52px; }
  .sidebar .nav-item span, .sidebar-logo h1,
  .sidebar-logo .version, .sidebar-footer .usd-rate { display: none; }
  .nav-item { padding: 10px; justify-content: center; }
}
</style>

// ── FORMATTERS ──────────────────────────────────────────────────
const fmt = {
  usd: (v, compact=false) => {
    if (v == null || isNaN(v)) return '—';
    const abs = Math.abs(v);
    if (compact) {
      if (abs >= 1e9) return (v<0?'-':'') + '$' + (abs/1e9).toFixed(1) + 'B';
      if (abs >= 1e6) return (v<0?'-':'') + '$' + (abs/1e6).toFixed(1) + 'M';
      if (abs >= 1e3) return (v<0?'-':'') + '$' + (abs/1e3).toFixed(0) + 'K';
    }
    return new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(v);
  },
  inr: (v, compact=false) => {
    if (v == null || isNaN(v)) return '—';
    const abs = Math.abs(v);
    if (compact) {
      if (abs >= 1e7) return (v<0?'-':'') + '₹' + (abs/1e7).toFixed(1) + 'Cr';
      if (abs >= 1e5) return (v<0?'-':'') + '₹' + (abs/1e5).toFixed(1) + 'L';
    }
    return '₹' + new Intl.NumberFormat('en-IN',{maximumFractionDigits:0}).format(v);
  },
  pct: (v, dec=1) => v == null || isNaN(v) ? '—' : (v*100).toFixed(dec) + '%',
  pctRaw: (v, dec=1) => v == null || isNaN(v) ? '—' : v.toFixed(dec) + '%',
  num: (v) => v == null || isNaN(v) ? '—' : new Intl.NumberFormat('en-US').format(Math.round(v)),
  delta: (v) => v >= 0 ? '+' + (v*100).toFixed(1) + '%' : (v*100).toFixed(1) + '%',
  sign: (v) => v == null || isNaN(v) ? '' : v >= 0 ? 'pos' : 'neg',
};

// ── API ──────────────────────────────────────────────────────────
async function callAPI(action, params = {}) {
  const token = localStorage.getItem(TOKEN_KEY);
  if (!token) throw new Error('Not authenticated');
  const qp = new URLSearchParams({ action, token, ...params });
  const res = await fetch(`${GAS_URL}?${qp}`);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const data = await res.json();
  if (data.error === 'Unauthorized') throw new Error('Unauthorized');
  if (data.error) throw new Error(data.error);
  return data;
}

// ── HOOKS ────────────────────────────────────────────────────────
function useData(action, params={}) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const token = localStorage.getItem(TOKEN_KEY);

  useEffect(() => {
    setLoading(true);
    if (!token) {
      setTimeout(() => { setData(getMockData(action)); setLoading(false); }, 600);
      return;
    }
    callAPI(action, params)
      .then(d => { setData(d); setLoading(false); })
      .catch(e => { setError(e.message); setLoading(false); });
  }, [action, token, JSON.stringify(params)]);

  const refresh = useCallback(() => {
    setLoading(true); setError(null);
    if (!token) {
      setTimeout(() => { setData(getMockData(action)); setLoading(false); }, 400);
      return;
    }
    callAPI(action, params)
      .then(d => { setData(d); setLoading(false); })
      .catch(e => { setError(e.message); setLoading(false); });
  }, [action, token]);

  return { data, loading, error, refresh };
}

// ── US PORTFOLIO SCREEN ───────────────────────────────────────────
function PortfolioScreen() {
  const { data, loading, error } = useData('getUSPortfolio');
  const [search, setSearch] = useState('');
  const [acctFilter, setAcctFilter] = useState('All');
  const [objFilter, setObjFilter] = useState('All');
  const [sortCol, setSortCol] = useState('mktValue');
  const [sortDir, setSortDir] = useState(-1);

  if (loading) return <LoadingCard />;
  if (error) return <ErrorCard msg={error} />;
  if (!data) return null;

  const positions = data.positions || [];
  const accounts = ['All', ...new Set(positions.map(p => p.account).filter(Boolean))];
  const objectives = ['All', ...new Set(positions.map(p => p.objective).filter(Boolean))];

  const filtered = positions.filter(p => {
    if (acctFilter !== 'All' && p.account !== acctFilter) return false;
    if (objFilter !== 'All' && p.objective !== objFilter) return false;
    if (search) {
      const q = search.toLowerCase();
      return p.symbol?.includes(q) || p.name?.toLowerCase().includes(q) || p.sector?.toLowerCase().includes(q);
    }
    return true;
  });

  const sorted = [...filtered].sort((a, b) => sortDir * ((a[sortCol]||0) - (b[sortCol]||0)));
  const totalMkt = sorted.reduce((s, p) => s + (p.mktValue||0), 0);
  const totalGain = sorted.reduce((s, p) => s + (p.gainLoss||0), 0);
  const totalIncome = sorted.reduce((s, p) => s + (p.annualDividend||0), 0);

  const toggleSort = (col) => {
    if (sortCol === col) setSortDir(d => -d);
    else { setSortCol(col); setSortDir(-1); }
  };
  const SH = ({ col, label }) => (
    <th onClick={() => toggleSort(col)} style={{cursor:'pointer',userSelect:'none'}}>
      {label}{sortCol===col ? (sortDir>0?' ↑':' ↓') : ''}
    </th>
  );

  return (
    <div className="fade-up">
      {/* Summary Row */}
      <div className="grid grid-3 section">
        <KPICard label="Market Value" value={fmt.usd(totalMkt,true)} color={C.accent} />
        <KPICard label="Unrealized G/L" value={fmt.usd(totalGain,true)}
          delta={fmt.pct(totalGain/Math.max(1, totalMkt - totalGain))}
          deltaClass={fmt.sign(totalGain)} color={totalGain>=0?C.green:C.red} />
        <KPICard label="Annual Income" value={fmt.usd(totalIncome,true)} color={C.teal} />
      </div>

      {/* Filters */}
      <div className="filter-bar">
        <input className="filter-input" placeholder="Search symbol, name, sector…"
          value={search} onChange={e => setSearch(e.target.value)} />
        {accounts.map(a => (
          <span key={a} className={`filter-pill ${acctFilter===a?'active':''}`}
            onClick={() => setAcctFilter(a)}>{a}</span>
        ))}
        <select className="filter-select" value={objFilter} onChange={e => setObjFilter(e.target.value)}>
          {objectives.map(o => <option key={o}>{o}</option>)}
        </select>
        <span className="dim" style={{fontSize:11,marginLeft:'auto'}}>
          {sorted.length} of {positions.length} positions
        </span>
      </div>

      {/* Table */}
      <div className="card" style={{padding:0}}>
        <div className="table-wrap">
          <table>
            <thead>
              <tr>
                <SH col="symbol" label="Symbol" />
                <th>Name</th>
                <th>Account</th>
                <th>Objective</th>
                <SH col="cmp" label="CMP" />
                <SH col="mktValue" label="Mkt Value" />
                <SH col="gainLoss" label="Gain / Loss" />
                <SH col="cagr" label="CAGR" />
                <SH col="annualDividend" label="Div/Yr" />
                <th>Type</th>
              </tr>
            </thead>
            <tbody>
              {sorted.slice(0,100).map((p, i) => (
                <tr key={i}>
                  <td><span className="mono accent" style={{fontWeight:500}}>{p.symbol?.toUpperCase()}</span></td>
                  <td style={{maxWidth:140,overflow:'hidden',textOverflow:'ellipsis'}}>{p.name}</td>
                  <td><span className="badge badge-blue">{p.account}</span></td>
                  <td><span className="badge badge-dim">{p.objective}</span></td>
                  <td className="mono right">{fmt.usd(p.cmp)}</td>
                  <td className="mono right" style={{color:'var(--text)'}}>{fmt.usd(p.mktValue,true)}</td>
                  <td className={`mono right ${fmt.sign(p.gainLoss)}`}>
                    {fmt.usd(p.gainLoss,true)}
                    {p.mktValue ? <span style={{fontSize:10,opacity:0.7}}> ({fmt.pct(p.gainLoss/(p.mktValue-p.gainLoss))})</span> : ''}
                  </td>
                  <td className={`mono right ${p.cagr>=0.15?'pos':p.cagr<0?'neg':'accent'}`}>
                    {fmt.pct(p.cagr)}
                  </td>
                  <td className="mono right">{p.annualDividend > 0 ? fmt.usd(p.annualDividend,true) : <span className="dim">—</span>}</td>
                  <td>
                    <span className={`badge ${p.taxType==='LT'?'badge-green':'badge-gold'}`}>{p.taxType||'?'}</span>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        {sorted.length > 100 && (
          <div style={{padding:'10px 14px',fontSize:11,color:'var(--text-dim)',borderTop:'1px solid var(--border)'}}>
            Showing 100 of {sorted.length} positions
          </div>
        )}
      </div>
    </div>
  );
}

  if (error) return <ErrorCard msg={error} />;
  if (!data) return null;

  const history = (data.history || []).map(h => ({
    ...h,
    year: h.date ? h.date.substring(0,4) : '',
    totalM: h.totalUSD / 1e6,

  const annualNLV = data.annualNLV || [];
  const returns = [];
  for (let i = 1; i < history.length; i++) {

        year: curr.year,

              {history.map((h, i) => {
                const prev = i > 0 ? history[i-1] : null;
                const ret = prev ? (h.totalUSD/prev.totalUSD - 1) : null;
                const qRet = prev?.qqq && h.qqq ? (h.qqq/prev.qqq - 1) : null;
                const alpha = ret != null && qRet != null ? ret - qRet : null;
                return (
                  <tr key={i}>
                    <td className="mono gold">{h.year}</td>
                    <td className="mono right" style={{color:'var(--text)'}}>{fmt.usd(h.totalUSD, true)}</td>
                    <td className={`mono right ${ret==null?'':fmt.sign(ret)}`}>
                      {ret != null ? fmt.pct(ret) : '—'}
                    </td>
                    <td className="mono right">{h.qqq ? '$' + h.qqq.toFixed(0) : '—'}</td>
                    <td className={`mono right ${qRet==null?'':fmt.sign(qRet)}`}>
                      {qRet != null ? fmt.pct(qRet) : '—'}
                    </td>
                    <td className={`mono right ${alpha==null?'':fmt.sign(alpha)}`}>
                      {alpha != null ? fmt.pct(alpha) : '—'}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ── LOGIN SCREEN ──────────────────────────────────────────────────
function LoginScreen({ onLogin }) {
  const [password, setPassword] = useState('');
  const [checking, setChecking] = useState(false);
  const [error, setError] = useState('');

  const attempt = async () => {
    if (!password) return;
    setChecking(true); setError('');
    try {
      const qp = new URLSearchParams({ action: 'ping', token: password });
      const res = await fetch(`${GAS_URL}?${qp}`);
      const data = await res.json();
      if (data.error === 'Unauthorized') {
        setError('Incorrect password');
      } else if (data.status === 'ok') {
        localStorage.setItem(TOKEN_KEY, password);
        onLogin();
      } else {
        setError('Unexpected response — check GAS deployment');
      }
    } catch (e) {
      setError('Connection failed: ' + e.message);
    }
    setChecking(false);
  };

  const handleKey = (e) => { if (e.key === 'Enter') attempt(); };

  return (
    <div className="login-overlay">
      <div className="login-box fade-up">
        <h1>Investment Desk</h1>
        <div className="login-sub">{VERSION} · Enter your access password</div>
        <input
          className="form-input"
          type="password"
          placeholder="Password"
          value={password}
          onChange={e => { setPassword(e.target.value); setError(''); }}
          onKeyDown={handleKey}
          autoFocus
          style={{marginBottom:12, fontSize:15, letterSpacing:'0.08em'}}
        />
        <div className="login-error">{error}</div>
        <button className="btn primary" style={{width:'100%',justifyContent:'center',padding:'9px'}}
          onClick={attempt} disabled={!password || checking}>
          {checking ? 'Checking…' : 'Unlock'}
        </button>
      </div>
    </div>
  );
}

// ── CONFIG SCREEN ─────────────────────────────────────────────────
function ConfigScreen({ onSave, onLogout }) {
  const [newPass, setNewPass] = useState('');
  const [checking, setChecking] = useState(false);
  const [result, setResult] = useState(null);

  const changePassword = async () => {
    if (!newPass) return;
    setChecking(true); setResult(null);
    try {
      const qp = new URLSearchParams({ action: 'ping', token: newPass });
      const res = await fetch(`${GAS_URL}?${qp}`);
      const data = await res.json();
      if (data.error === 'Unauthorized') {
        setResult({ ok: false, msg: 'Incorrect password — not saved' });
      } else if (data.status === 'ok') {
        localStorage.setItem(TOKEN_KEY, newPass);
        setResult({ ok: true, msg: 'Password updated — ' + data.version });
        setNewPass('');
      } else {
        setResult({ ok: false, msg: 'Unexpected response' });
      }
    } catch (e) {
      setResult({ ok: false, msg: 'Connection failed: ' + e.message });
    }
    setChecking(false);
  };

  return (
    <div className="config-screen card fade-up">
      <h2>Settings</h2>
      <p>Manage your access credentials. The password is stored locally in your browser.</p>

      <div className="form-group">
        <label className="form-label">Change Password</label>
        <input className="form-input" type="password"
          value={newPass} onChange={e => setNewPass(e.target.value)}
          placeholder="Enter new password to verify &amp; save"
          onKeyDown={e => e.key === 'Enter' && changePassword()} />
        <div className="form-hint">Will be verified against GAS before saving.</div>
      </div>

      {result && (
        <div style={{padding:'10px 14px',borderRadius:'var(--r)',marginBottom:16,
          background: result.ok ? 'rgba(61,214,140,0.1)' : 'rgba(255,94,126,0.1)',
          border: `1px solid ${result.ok ? C.green : C.red}`,
          color: result.ok ? C.green : C.red, fontSize:12,
          fontFamily:'var(--font-mono)'}}>
          {result.ok ? '✓ ' : '✗ '}{result.msg}
        </div>
      )}

      <div style={{display:'flex',gap:10,marginBottom:32}}>
        <button className="btn primary" onClick={changePassword} disabled={!newPass || checking}>
          {checking ? 'Verifying…' : 'Update Password'}
        </button>
      </div>

      <div style={{paddingTop:20,borderTop:'1px solid var(--border)'}}>
        <div className="form-label" style={{marginBottom:12}}>Session</div>
        <button className="btn" style={{color:'var(--red)',borderColor:'rgba(255,94,126,0.3)'}}
          onClick={onLogout}>
          Lock App
        </button>
        <div className="form-hint" style={{marginTop:8}}>Clears saved password from this browser. You'll need to enter it again on next visit.</div>
      </div>
    </div>
  );
}

function KPICard({ label, value, delta, deltaClass, color }) {
  return (
    <div className="card card-sm">
      <div className="stat-label" style={{marginBottom:6}}>{label}</div>
      <div className="stat-value" style={{color: color || 'var(--text)'}}>{value}</div>
      {delta && <div className={`stat-delta ${deltaClass}`}>{delta}</div>}
    </div>
  );
}

function IncomeRow({ label, value, color }) {
  return (
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <div style={{width:6,height:6,borderRadius:'50%',background:color}}/>
        <span style={{fontSize:12,color:'var(--text-mid)'}}>{label}</span>
      </div>
      <span className="mono" style={{fontSize:12,color:'var(--text)'}}>{fmt.usd(value, true)}</span>
    </div>
  );
}

function AllocationChart({ data }) {
  const colors = [C.accent, C.gold, C.teal, C.accent2];
  return (
    <div className="donut-wrap">
      <ResponsiveContainer width={160} height={160}>
        <PieChart>
          <Pie data={data} cx="50%" cy="50%" innerRadius={45} outerRadius={70}
            paddingAngle={3} dataKey="value" startAngle={90} endAngle={-270}>
            {data.map((_, i) => <Cell key={i} fill={colors[i % colors.length]} stroke="none"/>)}
          </Pie>
          <Tooltip formatter={(v) => fmt.usd(v, true)} contentStyle={{
            background:'#1d2230', border:'1px solid #222840', borderRadius:6,
            fontFamily:"'DM Mono',monospace", fontSize:11
          }}/>
        </PieChart>
      </ResponsiveContainer>
      <div className="donut-legend">
        {data.map((d, i) => (
          <div key={i} className="donut-legend-item">
            <div className="donut-dot" style={{background: colors[i % colors.length]}}/>
            <div>
              <div style={{fontSize:12,color:'var(--text)'}}>{d.label}</div>
              <div style={{fontSize:11,fontFamily:'var(--font-mono)',color:'var(--text-dim)'}}>
                {fmt.usd(d.value,true)} · {fmt.pct(d.pct)}
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>

}

const SCREENS = [
  { id: 'dashboard',   label: 'Dashboard',   icon: 'dashboard',   section: 'Overview' },
  { id: 'portfolio',   label: 'US Portfolio', icon: 'portfolio',   section: 'Holdings' },
  { id: 'india',       label: 'India Portfolio', icon: 'india',    section: 'Holdings' },
  { id: 'performance', label: 'Performance',  icon: 'performance', section: 'Analytics' },
  { id: 'tax',         label: 'Tax Planning', icon: 'tax',         section: 'Analytics' },

  { id: 'settings',    label: 'Settings',     icon: 'settings',    section: 'System' },
];

function IndiaPortfolioScreen() {
  const { data, loading, error } = useData('getIndiaPortfolio');
  if (loading) return <LoadingCard />;
  if (error) return <ErrorCard msg={error} />;
  if (!data) return null;
  const positions = data.positions || [];
  const totalINR = positions.reduce((s,p) => s + (p.mktValueINR||0), 0);
  const totalGain = positions.reduce((s,p) => s + (p.gainLossINR||0), 0);

  return (
    <div className="fade-up">
      <div className="grid grid-3 section">
        <KPICard label="India Holdings (INR)" value={fmt.inr(totalINR, true)} color={C.gold} />
        <KPICard label="India Holdings (USD)" value={fmt.usd(totalINR/(data.usdRate||86), true)} color={C.accent} />
        <KPICard label="Unrealized Gain (INR)" value={fmt.inr(totalGain, true)}
          deltaClass={fmt.sign(totalGain)} delta={fmt.pct(totalGain/Math.max(1,totalINR-totalGain))}
          color={totalGain>=0?C.green:C.red} />
      </div>
      <div className="card" style={{padding:0}}>
        <div className="table-wrap">
          <table>
            <thead><tr>
              <th>Symbol</th><th>Name</th><th>Account</th>
              <th className="right">CMP</th><th className="right">Mkt Val (INR)</th>
              <th className="right">G/L (INR)</th><th className="right">CAGR</th>
              <th>Type</th>
            </tr></thead>
            <tbody>
              {positions.map((p,i) => (
                <tr key={i}>
                  <td><span className="mono accent" style={{fontWeight:500}}>{String(p.symbol).toUpperCase()}</span></td>
                  <td style={{maxWidth:150,overflow:'hidden',textOverflow:'ellipsis'}}>{p.name}</td>
                  <td><span className="badge badge-gold">{p.account}</span></td>
                  <td className="mono right">{p.cmp ? '₹'+Math.round(p.cmp).toLocaleString('en-IN') : '—'}</td>
                  <td className="mono right" style={{color:'var(--text)'}}>{fmt.inr(p.mktValueINR, true)}</td>
                  <td className={`mono right ${fmt.sign(p.gainLossINR)}`}>{fmt.inr(p.gainLossINR, true)}</td>
                  <td className={`mono right ${p.cagr>=0.12?'pos':p.cagr<0?'neg':'accent'}`}>{fmt.pct(p.cagr)}</td>
                  <td><span className={`badge ${p.taxType==='LT'?'badge-green':'badge-gold'}`}>{p.taxType||'?'}</span></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

  if (error) return <ErrorCard msg={error} />;
  if (!data) return null;

  const entities = ['Sakina', 'Aliza', 'Etrade', 'Chhaya', 'Trust'];

  return (
    <div className="fade-up">
      <div style={{marginBottom:20}}>
        <div className="section-title">Tax Planning {yr}</div>
      </div>
      <div className="grid grid-2 section">
        {/* Realized Gains */}
        <div className="card">
          <div className="card-header"><span className="card-title">Realized Gains / Losses</span></div>
          <div className="table-wrap">
            <table>
              <thead><tr><th>Entity</th><th className="right">ST (Incl Carry)</th><th className="right">LT (Incl Carry)</th></tr></thead>
              <tbody>
                {entities.map((e,i) => {
                  const r = data.realizedByEntity?.[e];
                  return <tr key={i}>
                    <td style={{color:'var(--text)'}}>{e}</td>
                    <td className={`mono right ${r?.stRealizedInclCarry>=0?'pos':'neg'}`}>
                      {r ? fmt.usd(r.stRealizedInclCarry, true) : '—'}
                    </td>
                    <td className={`mono right ${r?.ltRealizedInclCarry>=0?'pos':'neg'}`}>
                      {r ? fmt.usd(r.ltRealizedInclCarry, true) : '—'}
                    </td>
                  </tr>;
                })}
              </tbody>
            </table>
          </div>
        </div>
        {/* Carry-Ins */}
        <div className="card">
          <div className="card-header"><span className="card-title">Loss Carry-Ins from {yr-1}</span></div>
          <div className="table-wrap">
            <table>
              <thead><tr><th>Entity</th><th className="right">ST Loss</th><th className="right">LT Loss</th><th className="right">Inv Exp</th></tr></thead>
              <tbody>
                {entities.map((e,i) => {
                  const c = data.carryInByEntity?.[e];
                  return <tr key={i}>
                    <td style={{color:'var(--text)'}}>{e}</td>
                    <td className={`mono right ${c?.stLossCarryIn<0?'neg':'dim'}`}>
                      {c ? fmt.usd(c.stLossCarryIn, true) : '—'}
                    </td>
                    <td className={`mono right ${c?.ltLossCarryIn<0?'neg':'dim'}`}>
                      {c ? fmt.usd(c.ltLossCarryIn, true) : '—'}
                    </td>
                    <td className="mono right dim">{c ? fmt.usd(c.investmentExpense, true) : '—'}</td>

            </table>
          </div>
        </div>
      </div>

      {/* Income by Entity */}
      <div className="card section">
        <div className="card-header"><span className="card-title">Income Summary by Entity — {yr}</span></div>
        <div className="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Entity</th>
                <th className="right">NQ Div</th>
                <th className="right">Q Div</th>
                <th className="right">ST G/L</th>
                <th className="right">LT G/L</th>
                <th className="right">Margin Int</th>
                <th className="right">Std Deduction</th>
              </tr>
            </thead>
            <tbody>
              {entities.map((e,i) => {
                const inc = data.incomeByEntity?.[e];
                return <tr key={i}>
                  <td style={{color:'var(--text)'}}>{e}</td>
                  <td className="mono right">{inc ? fmt.usd(inc.nqDiv, true) : '—'}</td>
                  <td className="mono right accent">{inc ? fmt.usd(inc.qDiv, true) : '—'}</td>
                  <td className={`mono right ${inc?.stGainLoss>=0?'pos':'neg'}`}>{inc ? fmt.usd(inc.stGainLoss, true) : '—'}</td>
                  <td className={`mono right ${inc?.ltGainLoss>=0?'pos':'neg'}`}>{inc ? fmt.usd(inc.ltGainLoss, true) : '—'}</td>
                  <td className="mono right neg">{inc ? fmt.usd(inc.marginInterest, true) : '—'}</td>
                  <td className="mono right dim">{inc ? fmt.usd(inc.standardDeduction, true) : '—'}</td>
                </tr>;
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

function HarvestScreen() {
  const { data: portData, loading } = useData('getUSPortfolio');
  if (loading) return <LoadingCard />;
  const positions = portData?.positions || [];
  const losers = positions.filter(p => p.gainLoss < 0 && p.mktValue > 0)
    .sort((a,b) => a.gainLoss - b.gainLoss);
  const totalLoss = losers.reduce((s,p) => s + p.gainLoss, 0);
  const potentialSavings = Math.abs(totalLoss) * 0.20;

  return (
    <div className="fade-up">
      <div className="grid grid-3 section">
        <KPICard label="Positions with Losses" value={losers.length} color={C.red} />
        <KPICard label="Total Harvestable Loss" value={fmt.usd(totalLoss, true)}
          delta="Available to offset gains" deltaClass="neg" color={C.red} />
        <KPICard label="Potential Tax Savings (20%)" value={fmt.usd(potentialSavings, true)}
          delta="At LTCG rate" deltaClass="pos" color={C.green} />
      </div>

      <div className="card">
        <div className="card-header">
          <span className="card-title">Loss Harvest Candidates</span>
          <span className="dim" style={{fontSize:10}}>Sorted by largest loss. Watch wash-sale rules (30-day window).</span>
        </div>
        <div className="table-wrap">
          <table>
            <thead><tr>
              <th>Symbol</th><th>Name</th><th>Account</th>
              <th className="right">Mkt Value</th><th className="right">Gain / Loss</th>
              <th className="right">Loss %</th><th className="right">CAGR</th>
              <th>Hold</th><th>Tax</th>
            </tr></thead>
            <tbody>
              {losers.map((p,i) => (
                <tr key={i}>
                  <td><span className="mono accent">{p.symbol?.toUpperCase()}</span></td>
                  <td style={{maxWidth:130,overflow:'hidden',textOverflow:'ellipsis'}}>{p.name}</td>
                  <td><span className="badge badge-blue">{p.account}</span></td>
                  <td className="mono right">{fmt.usd(p.mktValue,true)}</td>
                  <td className="mono right neg">{fmt.usd(p.gainLoss,true)}</td>
                  <td className="mono right neg">{fmt.pct(p.gainLoss/(p.mktValue-p.gainLoss))}</td>
                  <td className={`mono right ${p.cagr<-0.1?'neg':'dim'}`}>{fmt.pct(p.cagr)}</td>
                  <td className="mono dim">{p.holdingPeriodDays} days</td>
                  <td><span className={`badge ${p.taxType==='LT'?'badge-green':'badge-gold'}`}>{p.taxType||'?'}</span></td>
                </tr>
              ))}
              {losers.length === 0 && (
                <tr><td colSpan={9} className="dim center" style={{padding:'24px'}}>No positions with unrealized losses</td></tr>
              )}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState('dashboard');
  const [authed, setAuthed] = useState(!!localStorage.getItem(TOKEN_KEY));
  const [_, forceUpdate] = useState(0);
  const isDemo = !authed;

  if (!authed) {
    return <LoginScreen onLogin={() => setAuthed(true)} />;
  }

  const sections = [...new Set(SCREENS.map(s => s.section))];

  const renderScreen = () => {
    switch (screen) {
      case 'dashboard':   return <DashboardScreen />;
      case 'portfolio':   return <PortfolioScreen />;
      case 'india':       return <IndiaPortfolioScreen />;
      case 'performance': return <PerformanceScreen />;
      case 'tax':         return <TaxPlanningScreen />;
      case 'harvest':     return <HarvestScreen />;
      case 'settings':    return <ConfigScreen onSave={() => { setScreen('dashboard'); forceUpdate(n=>n+1); }} onLogout={() => { localStorage.removeItem(TOKEN_KEY); setAuthed(false); }} />;
      default:            return <DashboardScreen />;
    }
  };

  const currentScreen = SCREENS.find(s => s.id === screen);

  return (
    <div className="app">
      {/* Sidebar */}
      <aside className="sidebar">
        <div className="sidebar-logo">
          <h1>Investment Desk</h1>
          <div className="version">{VERSION} {isDemo ? '· demo' : '· live'}</div>
        </div>

        <nav className="nav">
          {sections.map(sec => (
            <div key={sec}>
              <div className="nav-section-label">{sec}</div>
              {SCREENS.filter(s => s.section === sec).map(s => (
                <div key={s.id}
                  className={`nav-item ${screen === s.id ? 'active' : ''}`}
                  onClick={() => setScreen(s.id)}>
                  <Icon name={s.icon} size={15} />
                  <span>{s.label}</span>
                </div>
              ))}
            </div>
          ))}
        </nav>

        <div className="sidebar-footer">
          <div className="usd-rate">
            USD/INR <span id="usdrate">₹{isDemo ? '86.5' : '—'}</span>
          </div>
        </div>
      </aside>

      {/* Main */}
      <main className="main">
        <div className="topbar">
          <h2>{currentScreen?.label || 'Investment Desk'}</h2>
          <div className="topbar-meta">
            {isDemo && <span className="badge badge-gold" style={{fontSize:10}}>DEMO</span>}
            <span className="topbar-ts">{new Date().toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' })}</span>
          </div>
        </div>
        <div className="content">
          {renderScreen()}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
